name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo
          coverage: none
          tools: composer:v2
      - run: composer validate --strict
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: vendor/bin/phpthis check
      - run: composer test
